slave:
  host: "0.0.0.0"
  port: 8001

  # 模型缓存目录（HuggingFace 默认缓存位置，一般不用改）
  model_cache_dir: "~/.cache/huggingface/hub"

  # 模型配置 / Model Config
  model:
    # 默认使用混元专业翻译模型（HuggingFace ID）
    # 即使模型尚未下载，服务也能启动，随后通过 /models/download 下载
    path: "tencent/hy-mt2-1.8b"

    # 模型类型："translation" 为专业翻译模型，"chat" 为通用对话模型
    # 会影响 prompt 构建方式（add_generation_prompt 等）
    model_type: "translation"

    torch_dtype: "float16"        # float16 / float32 / bfloat16 / auto
    device_map: "auto"            # auto / cuda / cpu / mps

    # 量化（可显著降低显存/内存占用，16G机器建议开启4bit）
    load_in_8bit: false
    load_in_4bit: false

    trust_remote_code: true
    max_length: 2048

  # 翻译配置 / Translation Config
  translation:
    system_prompt: ""
    user_template: "Translate the following segment into {target_lang}, without additional explanation.\n\n{text}"
    user_template_auto: "Translate the following segment into {target_lang}, without additional explanation.\n\n{text}"
    max_new_tokens: 512
