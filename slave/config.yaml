slave:
  host: "0.0.0.0"
  port: 8001

  # Model cache dir (HuggingFace default; usually no need to change)
  model_cache_dir: "~/.cache/huggingface/hub"

  # Ollama backend config
  # If set, Slave can translate via Ollama without needing transformers/torch locally.
  # This is the default path used by install_slave.bat.
  ollama:
    base_url: "http://localhost:11434"
    model: "hunyuan-mt:1.8b-q4"

  # Local transformers model config
  # Used when you want to run a model directly with transformers/torch
  # (install_slave.bat does NOT require this path - it uses Ollama.)
  model:
    path: "tencent/hy-mt2-1.8b"
    model_type: "translation"
    torch_dtype: "float16"
    device_map: "auto"
    load_in_8bit: false
    load_in_4bit: false
    trust_remote_code: true
    max_length: 2048

  # Translation prompt template
  translation:
    system_prompt: ""
    user_template: "Translate the following segment into {target_lang}, without additional explanation.\n\n{text}"
    user_template_auto: "Translate the following segment into {target_lang}, without additional explanation.\n\n{text}"
    max_new_tokens: 512
